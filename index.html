<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Student Planner</title>
        <link rel="stylesheet"href="styles.css">
    </head>
    <body>
        <div class="planner">
            <h1>Student Planner</h1>
            <p class="subtitle">Stay organized,one task at a time.</p>

            <div class="task-input">
                <input type="text"id="taskInput"placeholder="e.g.Finish assignment">
                <button id="addBtn">Add Task</button>
            </div>

            <ul id="taskList"></ul>
        </div>
        <script src="studentplanner.js"></script>
    </body>
</html>
